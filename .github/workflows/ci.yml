name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# cancel superseded in-progress runs (e.g. rapid pushes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # cheap and fast. linux, no windows toolchain needed for formatting.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
        working-directory: backend

  # clippy + tests. has to be windows because the backend uses
  # tokio's windows named pipes.
  backend:
    name: Backend (Rust)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # smart rust-specific cache: hashes Cargo.lock, prunes stale target
      # artifacts, and only saves when the source actually changed. way higher
      # hit rate than raw actions/cache.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          cache-on-failure: true

      # dropped --all-targets because integration_test (harness = false)
      # isn't running on CI and was costing ~40s of compile per run.
      - name: Clippy (deny warnings)
        run: cargo clippy --bin rook --tests -- -D warnings

      - name: Unit tests (storage layer)
        run: cargo test --bin rook memory::storage::tests -- --test-threads=1

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # electron's postinstall downloads the platform binary from GitHub,
      # which hits 504 more often than anyone would like. skip postinstall
      # scripts entirely: we only need node_modules on disk to syntax-check.
      - run: npm ci --ignore-scripts
      - name: Syntax check (electron entry points)
        run: |
          node --check src/main.js
          node --check src/preload.js
