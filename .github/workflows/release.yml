name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ── Rust backend (built automatically by `npm run release` prebuild hook,
      #    but we cache cargo here so the hook is fast) ────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # rust-specific cache. hashes Cargo.lock, prunes stale target
      # artifacts, re-saves only when source actually changed. on warm cache
      # the release backend build drops from ~7min to ~30s.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          cache-on-failure: true
          shared-key: release-build

      # ── Electron frontend ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Builds rook.exe (via prerelease hook) + Rook-Setup-<version>.exe and
      # publishes both to the GitHub Release matching the pushed tag.
      - name: Build + publish installer
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
