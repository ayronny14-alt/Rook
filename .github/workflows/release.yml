name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ── Rust backend (built automatically by `npm run release` prebuild hook,
      #    but we cache cargo here so the hook is fast) ────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('backend/Cargo.lock') }}

      # ── Electron frontend ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Builds rook.exe (via prerelease hook) + Rook-Setup-<version>.exe and
      # publishes both to the GitHub Release matching the pushed tag.
      - name: Build + publish installer
        working-directory: frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
