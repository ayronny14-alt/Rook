<!DOCTYPE html>
<html lang="en" data-theme="paper">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Rook</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
// helpers 

const uid = () => Math.random().toString(36).slice(2, 10);

function shortName(p) {
  if (!p) return '';
  const base = p.replace(/\\/g, '/').split('/').pop() || p;
  return base.length > 28 ? base.slice(0, 14) + '…' + base.slice(-12) : base;
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function relativeTime(ts) {
  if (!ts) return 'now';
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d === 1) return 'yesterday';
  if (d < 7) return `${d} days ago`;
  return new Date(ts).toLocaleDateString('en', { month: 'short', day: 'numeric' });
}

const TYPE_MAP = {
  person: 'person', people: 'person', human: 'person', user: 'person',
  place: 'place', location: 'place', city: 'place', country: 'place', region: 'place',
  tool: 'thing', technology: 'thing', app: 'thing', software: 'thing', thing: 'thing', object: 'thing', file: 'thing', document: 'thing',
  concept: 'fact', belief: 'fact', fact: 'fact', preference: 'fact', rule: 'fact', note: 'fact', memory: 'fact', observation: 'fact',
  project: 'project', repo: 'project', product: 'project', codebase: 'project',
  skill: 'skill', capability: 'skill', expertise: 'skill', language: 'skill',
};
function mapType(t) { return TYPE_MAP[(t || '').toLowerCase()] || 'thing'; }

// Dedupe by normalized label, cap to ~60 highest-scored, spread via
// golden-ratio spiral so the graph doesn't read as one dense clump.
function backendNodesToGraph(nodes) {
  const byLabel = new Map();
  (nodes || []).forEach(n => {
    const key = (n.title || n.label || n.node_id || '').toLowerCase().trim();
    if (!key) return;
    const score = n.total_score || n.confidence_score || 0.5;
    const prev  = byLabel.get(key);
    if (!prev || (prev._score || 0) < score) byLabel.set(key, { ...n, _score: score });
  });

  const deduped = Array.from(byLabel.values())
    .sort((a, b) => (b._score || 0) - (a._score || 0))
    .slice(0, 60);

  const PHI = Math.PI * (3 - Math.sqrt(5));
  const count = deduped.length;
  const mapped = deduped.map((n, i) => {
    const t = count > 1 ? i / (count - 1) : 0;
    const radius = 6 + Math.sqrt(t) * 40;
    const theta  = i * PHI;
    const score  = n._score || 0.5;
    return {
      id: n.node_id || n.id,
      t: mapType(n.node_type || n.type),
      x: 50 + radius * Math.cos(theta),
      y: 50 + radius * Math.sin(theta),
      r: score > 0.7 ? 3 : score > 0.4 ? 2 : 1,
      label: n.title || n.label || n.node_id || '?',
      live: false,
    };
  });
  return { nodes: mapped, edges: [] };
}

function backendConvsToSessions(convs) {
  return (convs || []).map(c => ({
    id: c.id,
    title: c.title || 'Untitled',
    when: relativeTime(c.updated_at),
    mins: c.message_count || 0,
    touched: [],
    created: [],
    live: false,
  }));
}

function backendSkillsToPlugins(items) {
  return (items || []).map(s => {
    // plugin_type from list_plugins: "skill" | "mcp" | "connector"
    const pt = (s.plugin_type || s.kind || '').toLowerCase();
    const kind = pt === 'mcp' ? 'MCP' : pt === 'connector' ? 'Connector' : 'Skill';
    return {
      id:   s.id || s.name,
      name: s.name || s.id || 'unknown',
      kind,
      cat:  s.category || s.cat || (s.owner ? s.owner : 'Other'),
      desc: s.description || s.desc || '',
      stars: s.stars || 0,
      installed: !!(s.enabled || s.installed || s.running || s.active),
    };
  });
}

const NODE_TYPES = {
  person:  { label: 'person',  color: 'var(--node-person)'  },
  place:   { label: 'place',   color: 'var(--node-place)'   },
  thing:   { label: 'thing',   color: 'var(--node-thing)'   },
  fact:    { label: 'fact',    color: 'var(--node-fact)'    },
  project: { label: 'project', color: 'var(--node-project)' },
  skill:   { label: 'skill',   color: 'var(--node-skill)'   },
};
// keep window.ROOK_DATA populated for NodeChip reads
window.ROOK_DATA = { NODE_TYPES, GRAPH: { nodes: [], edges: [] }, SESSIONS: [], PLUGINS: [] };

// Backend context 

const BackendCtx = React.createContext(null);

// Provider profiles. Each profile is a self-contained { name, baseUrl, apiKey,
// model, models[] } record. The UI lets you stack as many as you want and
// switch between them per-turn. The first one created becomes the active.
const DEFAULT_PROFILE = () => ({
  id: uid(),
  name: 'OpenAI',
  baseUrl: 'https://api.openai.com/v1',
  apiKey: '',
  model: '',
  models: [],
  lastFetched: 0,
});

function useProviders() {
  const [state, setState] = React.useState(() => {
    try {
      const raw = localStorage.getItem('rook:providers');
      if (raw) {
        const p = JSON.parse(raw);
        if (p && Array.isArray(p.profiles) && p.profiles.length > 0) return p;
      }
    } catch (_) {}
    const first = DEFAULT_PROFILE();
    return { profiles: [first], activeId: first.id };
  });

  React.useEffect(() => {
    try { localStorage.setItem('rook:providers', JSON.stringify(state)); } catch (_) {}
  }, [state]);

  const active = state.profiles.find(p => p.id === state.activeId) || state.profiles[0];

  const upsert = (prof) => setState(s => {
    const existing = s.profiles.findIndex(p => p.id === prof.id);
    const next = [...s.profiles];
    if (existing >= 0) next[existing] = { ...next[existing], ...prof };
    else next.push(prof);
    return { ...s, profiles: next };
  });

  const remove = (id) => setState(s => {
    const next = s.profiles.filter(p => p.id !== id);
    if (next.length === 0) next.push(DEFAULT_PROFILE());
    const activeId = s.activeId === id ? next[0].id : s.activeId;
    return { profiles: next, activeId };
  });

  const setActive = (id) => setState(s => ({ ...s, activeId: id }));

  const setActiveModel = (model) => setState(s => ({
    ...s,
    profiles: s.profiles.map(p => p.id === s.activeId ? { ...p, model } : p),
  }));

  async function refreshModels(id) {
    const prof = state.profiles.find(p => p.id === id);
    if (!prof) return;
    const base = (prof.baseUrl || '').replace(/\/$/, '');
    if (!base) return;
    try {
      const resp = await fetch(`${base}/models`, {
        headers: prof.apiKey ? { Authorization: `Bearer ${prof.apiKey}` } : {},
      });
      if (!resp.ok) throw new Error(`${resp.status}`);
      const data = await resp.json();
      const models = (data.data || data.models || [])
        .map(m => typeof m === 'string' ? m : (m.id || m.name || ''))
        .filter(Boolean)
        .sort();
      upsert({ ...prof, models, lastFetched: Date.now() });
      return models;
    } catch (e) {
      console.warn('model fetch failed', e);
      return null;
    }
  }

  return { state, active, upsert, remove, setActive, setActiveModel, refreshModels };
}

function BackendProvider({ children }) {
  const [pipeOk,     setPipeOk]     = React.useState(false);
  const [version,    setVersion]    = React.useState('');
  const [graph,      setGraph]      = React.useState({ nodes: [], edges: [] });
  const [sessions,   setSessions]   = React.useState([]);
  const [plugins,    setPlugins]    = React.useState([]);
  const [curatedIds, setCuratedIds] = React.useState([]);

  // provider profiles
  const providers = useProviders();

  // chat state
  const [convId,     setConvId]     = React.useState(null);
  const [convTitle,  setConvTitle]  = React.useState('New conversation');
  const [msgs,       setMsgs]       = React.useState([]);
  const [streaming,  setStreaming]  = React.useState(false);
  const [mode,       setMode]       = React.useState('chat');
  const [approval,   setApproval]   = React.useState(null);

  const streamRef     = React.useRef('');
  const convIdRef     = React.useRef(null);
  const activeModelRef = React.useRef(null);

  // keep refs in sync so closures in onMessage see current values
  React.useEffect(() => { convIdRef.current = convId; }, [convId]);
  React.useEffect(() => { activeModelRef.current = providers.active?.model || null; }, [providers.active?.model]);

  // Ctrl/Cmd + 1/2/3 swap chat / coder / team. the active mode reads
  // as a subtle underline in the composer and the keys just work.
  React.useEffect(() => {
    const onKey = e => {
      if (!(e.ctrlKey || e.metaKey) || e.shiftKey || e.altKey) return;
      if (e.target && /INPUT|TEXTAREA/.test(e.target.tagName) && e.key !== '1' && e.key !== '2' && e.key !== '3') return;
      if (e.key === '1') { e.preventDefault(); setMode('chat'); }
      else if (e.key === '2') { e.preventDefault(); setMode('coder'); }
      else if (e.key === '3') { e.preventDefault(); setMode('team'); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // sync graph + sessions to window.ROOK_DATA so NodeChip works
  React.useEffect(() => { window.ROOK_DATA.GRAPH    = graph;    }, [graph]);
  React.useEffect(() => { window.ROOK_DATA.SESSIONS = sessions; }, [sessions]);
  React.useEffect(() => { window.ROOK_DATA.PLUGINS  = plugins;  }, [plugins]);

  React.useEffect(() => {
    if (!window.rook) return;

    window.rook.getAppVersion().then(v => setVersion(v || '')).catch(() => {});

    window.rook.send({ type: 'get_conversations', id: uid() });
    window.rook.send({ type: 'query_memory',      id: uid(), query: '', limit: 100 });
    window.rook.send({ type: 'list_skills',       id: uid() });
    window.rook.send({ type: 'list_plugins',      id: uid() });
    window.rook.send({ type: 'health_check',      id: uid() });

    const unsub = window.rook.onMessage(msg => {
      switch (msg.type) {
        case 'memory_results':
          setGraph(backendNodesToGraph(msg.nodes));
          break;

        case 'context_curated':
          setCuratedIds((msg.nodes || []).map(n => n.node_id || n.id));
          break;

        case 'conversation_list': {
          const convs = msg.conversations || [];
          setSessions(backendConvsToSessions(convs));
          if (!convIdRef.current && convs.length > 0) {
            const first = convs[0];
            setConvId(first.id);
            setConvTitle(first.title || 'Untitled');
            window.rook.send({ type: 'get_conversation_messages', id: uid(), conversation_id: first.id });
          }
          break;
        }

        case 'conversation_messages':
          if (msg.conversation_id === convIdRef.current || !convIdRef.current) {
            setMsgs((msg.messages || []).map(m => ({
              role: m.role === 'user' ? 'user' : 'assistant',
              text: m.content || '',
              ts: m.created_at ? (m.created_at > 2e12 ? m.created_at : m.created_at * 1000) : Date.now(),
              model: m.model || null,
            })));
          }
          break;

        case 'conversation_titled':
          if (msg.conversation_id === convIdRef.current)
            setConvTitle(msg.title || '');
          // update in sessions list too
          setSessions(prev => prev.map(s =>
            s.id === msg.conversation_id ? { ...s, title: msg.title || s.title } : s
          ));
          break;

        case 'chat_chunk':
          if (msg.token) {
            streamRef.current += msg.token;
            const snap = streamRef.current;
            setMsgs(prev => {
              const last = prev[prev.length - 1];
              if (last?.role === 'assistant' && last._streaming)
                return [...prev.slice(0, -1), { ...last, text: snap }];
              const m = activeModelRef.current || null;
              return [...prev, { role: 'assistant', text: snap, _streaming: true, ts: Date.now(), model: m }];
            });
          }
          break;

        case 'chat_done':
        case 'chat':
          streamRef.current = '';
          setStreaming(false);
          setMsgs(prev => {
            const last = prev[prev.length - 1];
            if (last?._streaming)
              return [...prev.slice(0, -1), { ...last, _streaming: false }];
            if (msg.content)
              return [...prev, { role: 'assistant', text: msg.content }];
            return prev;
          });
          window.rook.send({ type: 'query_memory', id: uid(), query: '', limit: 100 });
          window.rook.send({ type: 'get_conversations', id: uid() });
          break;

        case 'pending_tool_approval':
          setApproval(msg);
          break;

        case 'cancelled':
          streamRef.current = '';
          setStreaming(false);
          setApproval(null);
          setMsgs(prev => {
            const last = prev[prev.length - 1];
            if (last?._streaming)
              return [...prev.slice(0, -1), { ...last, _streaming: false, text: last.text || '(cancelled)' }];
            return prev;
          });
          break;

        case 'skills_list':
        case 'plugin_list': {
          // merge results from both list_skills and list_plugins - skills are
          // file-based (.docu/skills), plugins are installed MCPs/connectors.
          const incoming = backendSkillsToPlugins(msg.skills || msg.plugins || []);
          setPlugins(prev => {
            const map = new Map();
            for (const p of prev) map.set(p.id || p.name, p);
            for (const p of incoming) map.set(p.id || p.name, p);
            return Array.from(map.values());
          });
          break;
        }

        case 'config_updated':
          break;

        case 'error':
          streamRef.current = '';
          setStreaming(false);
          setMsgs(prev => {
            const last = prev[prev.length - 1];
            if (last?._streaming)
              return [...prev.slice(0, -1), { ...last, _streaming: false, text: last.text || '(error)' }];
            return prev;
          });
          console.error('[rook]', msg.message);
          break;
      }
    });

    const unsubPipe = window.rook.onPipeStatus(s => {
      // main.js emits an object {connected, reconnecting, attempt, ...}
      const ok = typeof s === 'object' ? !!s.connected : s === 'connected';
      setPipeOk(ok);
      if (ok) {
        window.rook.send({ type: 'get_conversations', id: uid() });
        window.rook.send({ type: 'query_memory',      id: uid(), query: '', limit: 200 });
        window.rook.send({ type: 'list_skills',       id: uid() });
      }
    });

    // pull current pipe state directly - the 'connect' event may fire before
    // this subscription attaches, and we don't want to guess.
    const poll = () => {
      if (!window.rook?.getPipeStatus) return;
      window.rook.getPipeStatus().then(s => {
        if (s && typeof s.connected === 'boolean') setPipeOk(s.connected);
      }).catch(() => {});
    };
    poll();
    const pollTimer = setInterval(poll, 2000);

    return () => {
      clearInterval(pollTimer);
      try { unsub && unsub(); } catch (_) {}
      try { unsubPipe && unsubPipe(); } catch (_) {}
    };
  }, []);

  function sendChat(text) {
    if (!text.trim() || streaming) return;
    const chatId = uid();
    setMsgs(prev => [...prev, { role: 'user', text, ts: Date.now() }]);
    setStreaming(true);
    streamRef.current = '';
    const p = providers.active || {};
    window.rook.send({
      type: 'chat',
      id: chatId,
      conversation_id: convId || undefined,
      message: text,
      agent_mode: mode,
      base_url: p.baseUrl || undefined,
      api_key: p.apiKey || undefined,
      model: p.model || undefined,
    });
  }

  // push the active profile into the backend whenever it changes so the
  // rust side knows which endpoint to hit for background tasks too.
  React.useEffect(() => {
    if (!window.rook || !providers.active) return;
    const p = providers.active;
    if (!p.baseUrl && !p.apiKey && !p.model) return;
    window.rook.send({ type: 'update_config', id: uid(), base_url: p.baseUrl || '', api_key: p.apiKey || '', model: p.model || '' });
    try { window.rook.saveEnvSettings && window.rook.saveEnvSettings({ apiUrl: p.baseUrl, apiKey: p.apiKey, model: p.model }); } catch (_) {}
  }, [providers.active && providers.active.id, providers.active && providers.active.model, providers.active && providers.active.apiKey, providers.active && providers.active.baseUrl]);

  function stopChat() {
    if (!streaming) return;
    window.rook.send({ type: 'cancel_request', id: uid() });
  }

  function newConversation() {
    setConvId(null);
    setConvTitle('New conversation');
    setMsgs([]);
    setStreaming(false);
    setApproval(null);
    streamRef.current = '';
  }

  function loadConversation(id, title) {
    if (id === convId) return;
    setConvId(id);
    setConvTitle(title || 'Untitled');
    setMsgs([]);
    setStreaming(false);
    setApproval(null);
    streamRef.current = '';
    window.rook.send({ type: 'get_conversation_messages', id: uid(), conversation_id: id });
  }

  function approveTools(ok) {
    if (!approval) return;
    window.rook.send({ type: 'approve_pending_tools', id: uid(), conversation_id: approval.conversation_id, approved: ok });
    setApproval(null);
  }

  function saveSettings(cfg) {
    window.rook.saveEnvSettings(cfg);
    window.rook.send({ type: 'update_config', id: uid(), base_url: cfg.apiUrl || '', api_key: cfg.apiKey || '', model: cfg.model || '' });
  }

  const ctx = {
    pipeOk, version,
    graph, sessions, plugins, curatedIds,
    convId, convTitle, msgs, streaming, mode, setMode, approval,
    sendChat, stopChat, newConversation, loadConversation, approveTools, saveSettings,
    providers,
  };

  return <BackendCtx.Provider value={ctx}>{children}</BackendCtx.Provider>;
}

function useBackend() { return React.useContext(BackendCtx); }

// Primitives 

function NodeChip({ id, onHover, onClick }) {
  const node = (window.ROOK_DATA.GRAPH.nodes || []).find(n => n.id === id);
  if (!node) return <span className="mono" style={{fontSize:12,color:'var(--ink-4)'}}>[{id}]</span>;
  return (
    <span
      className={`nodechip nodechip-${node.t}`}
      onMouseEnter={() => onHover && onHover(id)}
      onMouseLeave={() => onHover && onHover(null)}
      onClick={() => onClick && onClick(id)}
      title={`${node.t} · ${node.label}`}
    >
      <span className="nodechip-dot"/>
      <span>{node.label}</span>
    </span>
  );
}

// Graph 

// Distinct glyph per node type. Every shape gets a soft drop-shadow for
// depth, and highlighted nodes pick up a brighter inner fill so they lift
// off the graph instead of reading as uniform squares.
function renderGlyph(type, x, y, r, color, solid) {
  const shadow = { filter: 'drop-shadow(0 1px 1.5px rgba(0,0,0,0.18))' };
  if (type === 'person') {
    // circle with a concentric iris and a soft outer ring
    return (
      <g style={shadow}>
        <circle cx={x} cy={y} r={r + 2.5} fill="none" stroke={color} strokeWidth=".6" opacity=".5"/>
        <circle cx={x} cy={y} r={r} fill={color}/>
        <circle cx={x} cy={y} r={r * 0.4} fill="var(--bg-card)" opacity={solid ? 0.9 : 0.55}/>
      </g>
    );
  }
  if (type === 'place') {
    // nested diamond - outer line, inner fill
    const s = r + 1.5;
    const si = r * 0.5;
    return (
      <g style={shadow}>
        <polygon points={`${x},${y-s} ${x+s},${y} ${x},${y+s} ${x-s},${y}`}
          fill={solid ? color : 'var(--bg-card)'} stroke={color} strokeWidth="1.3"/>
        <polygon points={`${x},${y-si} ${x+si},${y} ${x},${y+si} ${x-si},${y}`}
          fill={color} opacity={solid ? 0.35 : 0.7}/>
      </g>
    );
  }
  if (type === 'thing') {
    // rounded square with a corner notch
    const s = r + 0.5;
    return (
      <g style={shadow}>
        <rect x={x-s} y={y-s} width={s*2} height={s*2} rx="1.8" ry="1.8"
          fill={solid ? color : 'var(--bg-card)'} stroke={color} strokeWidth="1.25"/>
        <circle cx={x + s*0.45} cy={y - s*0.45} r={s*0.22} fill={color} opacity={solid ? 0.55 : 0.8}/>
      </g>
    );
  }
  if (type === 'fact') {
    // plus inside a thin ring
    return (
      <g style={shadow}>
        <circle cx={x} cy={y} r={r + 0.8} fill="var(--bg-card)" stroke={color} strokeWidth="1.1" opacity={solid ? 0.95 : 0.75}/>
        <g stroke={color} strokeWidth="1.6" strokeLinecap="round">
          <line x1={x - r*0.7} y1={y} x2={x + r*0.7} y2={y}/>
          <line x1={x} y1={y - r*0.7} x2={x} y2={y + r*0.7}/>
        </g>
      </g>
    );
  }
  if (type === 'project') {
    // hexagon with a tiny inner fleck
    const pts = [];
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI / 3) * i - Math.PI / 6;
      pts.push(`${x + Math.cos(a) * (r+1.4)},${y + Math.sin(a) * (r+1.4)}`);
    }
    return (
      <g style={shadow}>
        <polygon points={pts.join(' ')} fill={color} stroke={color} strokeWidth="1.2" opacity={solid ? 1 : 0.88}/>
        <circle cx={x} cy={y} r={r * 0.35} fill="var(--bg-card)" opacity={solid ? 0.85 : 0.5}/>
      </g>
    );
  }
  if (type === 'skill') {
    // upward triangle with an inner baseline
    const s = r + 1.5;
    return (
      <g style={shadow}>
        <polygon points={`${x},${y-s} ${x+s*0.95},${y+s*0.82} ${x-s*0.95},${y+s*0.82}`}
          fill={solid ? color : 'var(--bg-card)'} stroke={color} strokeWidth="1.25"/>
        <line x1={x - s*0.5} y1={y + s*0.45} x2={x + s*0.5} y2={y + s*0.45}
          stroke={color} strokeWidth="0.9" opacity={solid ? 0.4 : 0.75}/>
      </g>
    );
  }
  return <circle cx={x} cy={y} r={r} fill={color} style={shadow}/>;
}

function Graph({ width = 900, height = 620, highlightIds = [], recentIds = [], onNodeHover, onNodeClick, selectedId, showLabels = true, variant = 'atlas' }) {
  const { GRAPH, NODE_TYPES: NT } = window.ROOK_DATA;
  const hiSet     = new Set(highlightIds);
  const recentSet = new Set(recentIds);
  const pad = variant === 'ambient' ? 20 : 40;
  const toX = x => pad + (x / 100) * (width  - pad * 2);
  const toY = y => pad + (y / 100) * (height - pad * 2);
  const nodeById = id => GRAPH.nodes.find(n => n.id === id);
  const rFor = tier => ({ 1: 4, 2: 6, 3: 9 }[tier] || 4);

  return (
    <svg className="graph-svg" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet">
      <g>
        {(GRAPH.edges || []).map((e, i) => {
          const a = nodeById(e.a), b = nodeById(e.b);
          if (!a || !b) return null;
          const active  = hiSet.has(a.id) && hiSet.has(b.id);
          const touched = recentSet.has(a.id) || recentSet.has(b.id);
          return (
            <line key={i}
              x1={toX(a.x)} y1={toY(a.y)} x2={toX(b.x)} y2={toY(b.y)}
              stroke={active ? 'var(--signal)' : 'var(--ink-3)'}
              strokeWidth={active ? 1.4 : Math.max(0.5, (e.w || 0.5) * 1.1)}
              opacity={active ? 0.85 : touched ? 0.45 : 0.32}
              strokeDasharray={e.contrastive ? '3 3' : 'none'}
            />
          );
        })}
      </g>
      <g>
        {GRAPH.nodes.filter(n => n.live).map(n => (
          <circle key={'p'+n.id} cx={toX(n.x)} cy={toY(n.y)} r={rFor(n.r)+4}
            fill="none" stroke="var(--signal)" strokeWidth=".8" opacity=".5">
            <animate attributeName="r" from={rFor(n.r)+4} to={rFor(n.r)+14} dur="2.4s" repeatCount="indefinite"/>
            <animate attributeName="opacity" from=".55" to="0" dur="2.4s" repeatCount="indefinite"/>
          </circle>
        ))}
      </g>
      <g>
        {GRAPH.nodes.map(n => {
          const r      = rFor(n.r);
          const isHi   = hiSet.has(n.id);
          const isRec  = recentSet.has(n.id);
          const isSel  = selectedId === n.id;
          const nt     = NT[n.t] || NT.thing;
          const color  = (n.live || isHi) ? 'var(--signal)' : nt.color;
          return (
            <g key={n.id} style={{ cursor: 'pointer' }}
               onMouseEnter={() => onNodeHover && onNodeHover(n.id)}
               onMouseLeave={() => onNodeHover && onNodeHover(null)}
               onClick={() => onNodeClick && onNodeClick(n.id)}>
              {isSel && <circle cx={toX(n.x)} cy={toY(n.y)} r={r+7} fill="none" stroke="var(--ink)" strokeWidth="1"/>}
              {renderGlyph(n.t, toX(n.x), toY(n.y), r, color, isHi || isRec)}
              {showLabels && (n.r >= 2 || isHi || isSel || isRec) && (
                <text
                  x={toX(n.x) + r + 5} y={toY(n.y) + 3}
                  fontSize={n.r >= 3 ? 12 : 10}
                  fontFamily={n.r >= 3 ? 'var(--fs-display)' : 'var(--fs-mono)'}
                  fontStyle={n.r >= 3 ? 'italic' : 'normal'}
                  fill={isHi ? 'var(--signal-ink)' : 'var(--ink-2)'}
                  letterSpacing={n.r >= 3 ? '0' : '.04em'}
                >{n.label}</text>
              )}
            </g>
          );
        })}
      </g>
    </svg>
  );
}

// Chat 

function Chat({ onHoverNode, selectedNode, onSelectNode }) {
  const { convTitle, msgs, streaming, sendChat, stopChat, curatedIds, approval, approveTools, mode, setMode, providers } = useBackend();
  const [hoveredChip, setHoveredChip] = React.useState(null);
  const [input, setInput] = React.useState('');
  const [attachments, setAttachments] = React.useState([]); // {kind:'file'|'image', name, content?, dataUrl?}
  const [dragHover, setDragHover] = React.useState(false);
  const streamEl = React.useRef(null);
  const taRef    = React.useRef(null);

  React.useEffect(() => { onHoverNode && onHoverNode(hoveredChip); }, [hoveredChip]);

  // follow the stream - also watch the last message's text length so growing
  // assistant tokens keep scrolling, not just new messages.
  const tailLen = msgs.length > 0 ? (msgs[msgs.length - 1].text || '').length : 0;
  React.useEffect(() => {
    if (streamEl.current) streamEl.current.scrollTop = streamEl.current.scrollHeight;
  }, [msgs.length, tailLen, streaming]);

  const resetTaHeight = () => {
    if (taRef.current) taRef.current.style.height = 'auto';
  };

  // Compose final message: attachments are folded into context blocks the model
  // can read. Files become <file path="..."> blocks; images are noted with an
  // [image attached] hint (vision dispatch lives in a future round).
  const buildPayload = () => {
    let body = '';
    for (const a of attachments) {
      if (a.kind === 'file') {
        const trunc = a.content.length > 8000
          ? a.content.slice(0, 8000) + '\n…[truncated, ' + a.content.length + ' chars total]'
          : a.content;
        body += `<file path="${a.name}">\n${trunc}\n</file>\n\n`;
      } else if (a.kind === 'image') {
        body += `[image attached: ${a.name}, ${Math.round(a.dataUrl.length / 1024)}KB]\n\n`;
      }
    }
    return body + input.trim();
  };

  const send = () => {
    const text = input.trim();
    if ((!text && attachments.length === 0) || streaming) return;
    const payload = buildPayload();
    if (!payload.trim()) return;
    sendChat(payload);
    setInput('');
    setAttachments([]);
    resetTaHeight();
  };

  const onKeyDown = e => {
    // don't submit mid-IME composition (Chinese/Japanese/Korean)
    if (e.isComposing || e.nativeEvent?.isComposing || e.keyCode === 229) return;
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  };

  const autoResize = e => {
    const el = e.target;
    el.style.height = 'auto';
    el.style.height = Math.min(200, el.scrollHeight) + 'px';
  };

 // Drop ingestion 
  const onDragOver = e => { e.preventDefault(); e.stopPropagation(); setDragHover(true); };
  const onDragLeave = e => { e.preventDefault(); e.stopPropagation(); setDragHover(false); };
  const onDrop = async e => {
    e.preventDefault(); e.stopPropagation();
    setDragHover(false);
    const files = Array.from(e.dataTransfer?.files || []);
    if (files.length === 0) return;
    const next = [];
    for (const f of files) {
      try {
        if (f.type.startsWith('image/')) {
          const dataUrl = await fileToDataUrl(f);
          next.push({ kind: 'image', name: f.name, dataUrl });
        } else {
          // try electron's read-by-path first (works for true OS drops),
          // fall back to FileReader if path is unavailable
          let content = '';
          if (f.path && window.rook?.readFileDrop) {
            try { content = await window.rook.readFileDrop(f.path); }
            catch (_) {}
          }
          if (!content) content = await f.text();
          next.push({ kind: 'file', name: f.path || f.name, content });
        }
      } catch (err) {
        console.error('attach failed:', err);
      }
    }
    setAttachments(prev => [...prev, ...next]);
    taRef.current?.focus();
  };

 // Paste handling: images become attachments, text falls through 
  const onPaste = async e => {
    const items = Array.from(e.clipboardData?.items || []);
    const imageItem = items.find(it => it.type.startsWith('image/'));
    if (imageItem) {
      e.preventDefault();
      const blob = imageItem.getAsFile();
      if (blob) {
        const dataUrl = await fileToDataUrl(blob);
        setAttachments(prev => [...prev, {
          kind: 'image',
          name: blob.name || `pasted-${Date.now()}.png`,
          dataUrl,
        }]);
      }
    }
  };

  const removeAttachment = i => setAttachments(prev => prev.filter((_, j) => j !== i));

  return (
    <div
      className={`chat-col-wrap${dragHover ? ' is-drop' : ''}`}
      onDragOver={onDragOver}
      onDragLeave={onDragLeave}
      onDrop={onDrop}
    >
      {dragHover && (
        <div className="drop-overlay">
          <div className="drop-overlay-inner">
            <div className="drop-overlay-mark"/>
            <div className="drop-overlay-title">drop to attach</div>
            <div className="drop-overlay-sub">files become context, images stay inline</div>
          </div>
        </div>
      )}
      <section className="chat-stream" ref={streamEl}>
        <div className="chat-stream-inner">
          {msgs.length === 0 && !streaming ? (
            <div className="chat-empty">
              <div className="chat-empty-mark"/>
              <div className="chat-empty-title">a quiet morning, then</div>
              <p className="chat-empty-sub">
                say something. rook listens, remembers, draws a map of you over time.
                the memory pane in the corner is the map so far.
              </p>
            </div>
          ) : (
            <>
              <header className="chat-session-head">
                <h1 className="chat-session-title">{convTitle}</h1>
                <div className="chat-session-meta">
                  <span>{new Date().toLocaleDateString('en', { weekday: 'short', hour: 'numeric', minute: '2-digit' })}</span>
                  {curatedIds.length > 0 && <><span className="dotm"/><span>{curatedIds.length} nodes retrieved</span></>}
                </div>
              </header>

              {msgs.map((m, i) => {
                const prev = msgs[i - 1];
                const gap = prev && m.ts && prev.ts ? (m.ts - prev.ts) : 0;
                const showDivider = gap >= 10 * 60 * 1000;
                return (
                  <React.Fragment key={i}>
                    {showDivider && <TimeDivider ts={m.ts}/>}
                    <Msg m={m} onHoverChip={setHoveredChip} onClickChip={onSelectNode}/>
                  </React.Fragment>
                );
              })}

              {curatedIds.length > 0 && (
                <div className="traversal-trail">
                  <span className="tt-lbl">retrieved</span>
                  {curatedIds.slice(0, 8).map((id, i) => (
                    <React.Fragment key={id}>
                      {i > 0 && <span>·</span>}
                      <span style={{fontSize:12,color:'var(--signal-ink)',cursor:'pointer'}} onClick={() => onSelectNode && onSelectNode(id)}>
                        {(window.ROOK_DATA.GRAPH.nodes.find(n => n.id === id) || {}).label || id}
                      </span>
                    </React.Fragment>
                  ))}
                </div>
              )}
            </>
          )}
        </div>
      </section>

      <div className="chat-fade"/>

      {approval && (
        <div className="approval-bar">
          <span>{approval.tool_name || 'tool'} - approve?</span>
          <span style={{fontSize:12,color:'var(--ink-4)',flex:1,marginLeft:8,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {approval.description || ''}
          </span>
          <button className="btn btn-solid" onClick={() => approveTools(true)}>allow</button>
          <button className="btn btn-danger" onClick={() => approveTools(false)}>deny</button>
        </div>
      )}

      <div className={`composer${streaming ? ' is-streaming' : ''}${input.length > 0 ? ' has-text' : ''}`}>
        {attachments.length > 0 && (
          <div className="composer-attachments">
            {attachments.map((a, i) => (
              <div key={i} className={`attach-chip attach-${a.kind}`}>
                {a.kind === 'image' ? (
                  <img src={a.dataUrl} alt={a.name} className="attach-thumb"/>
                ) : (
                  <span className="attach-icon">▤</span>
                )}
                <span className="attach-name" title={a.name}>{shortName(a.name)}</span>
                <button className="attach-x" onClick={() => removeAttachment(i)} title="remove">×</button>
              </div>
            ))}
          </div>
        )}
        <textarea
          ref={taRef}
          value={input}
          onChange={e => { setInput(e.target.value); autoResize(e); }}
          onKeyDown={onKeyDown}
          onPaste={onPaste}
          placeholder={attachments.length > 0 ? 'add a note (optional), then send' : 'message rook'}
          rows={1}
        />
        <div className="composer-foot">
          <ProviderPicker providers={providers}/>
          <ModelPicker providers={providers}/>
          <div className="mode-switch">
            {['chat','coder','team'].map((m, i) => (
              <button
                key={m}
                className={mode === m ? 'is-active' : ''}
                onClick={() => setMode(m)}
                title={`${m} · ctrl+${i + 1}`}
              >
                {m}
                <span className="mode-hotkey">{i + 1}</span>
              </button>
            ))}
          </div>
          <div className="composer-spacer"/>
          <CharCount value={input}/>
          {streaming
            ? <button className="btn btn-danger" style={{height:32}} onClick={stopChat}>stop</button>
            : (
              <div className="composer-send-wrap">
                <span className="composer-kbd" aria-hidden>↵</span>
                <button className="composer-send" onClick={send} title="send · Enter" disabled={!input.trim() && attachments.length === 0}>
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                    <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </button>
              </div>
            )
          }
        </div>
      </div>
    </div>
  );
}

// Lightweight markdown renderer. Not full CommonMark - we only care about
// the subset that shows up in chat: headings, bold, italic, inline code,
// fenced code, unordered lists, ordered lists, blockquotes, links, rules.
// Styled in the Quiet Cartography palette so it doesn't read as stock markdown.
function renderInline(str) {
  const out = [];
  let i = 0, key = 0;
  const push = (node) => out.push(React.cloneElement ? node : node);
  while (i < str.length) {
    // code `...`
    const code = str.slice(i).match(/^`([^`]+)`/);
    if (code) { out.push(<code key={key++} className="md-ic">{code[1]}</code>); i += code[0].length; continue; }
    // bold **...**
    const bold = str.slice(i).match(/^\*\*([^*]+)\*\*/);
    if (bold) { out.push(<strong key={key++} className="md-b">{renderInline(bold[1])}</strong>); i += bold[0].length; continue; }
    // italic *...* (not **...**)
    const em = str.slice(i).match(/^\*([^*\n]+)\*/);
    if (em) { out.push(<em key={key++} className="md-i">{renderInline(em[1])}</em>); i += em[0].length; continue; }
    // link [text](url)
    const link = str.slice(i).match(/^\[([^\]]+)\]\(([^)]+)\)/);
    if (link) {
      out.push(<a key={key++} className="md-a" href={link[2]} onClick={e => { e.preventDefault(); window.rook?.openExternal?.(link[2]); }}>{link[1]}</a>);
      i += link[0].length; continue;
    }
    // plain char; batch until the next marker
    const nextMarker = str.slice(i).search(/[`*\[]/);
    const take = nextMarker === -1 ? str.length - i : Math.max(1, nextMarker);
    out.push(str.slice(i, i + take));
    i += take;
  }
  return out;
}

function MarkdownRender({ text }) {
  // parse into blocks: fenced code, headings, lists, blockquotes, paragraphs
  const blocks = [];
  const lines = (text || '').split('\n');
  let i = 0, key = 0;
  while (i < lines.length) {
    const line = lines[i];
    // fenced code block
    const fence = line.match(/^```(\w*)\s*$/);
    if (fence) {
      const lang = fence[1] || '';
      i++;
      const buf = [];
      while (i < lines.length && !/^```\s*$/.test(lines[i])) { buf.push(lines[i]); i++; }
      if (i < lines.length) i++; // skip closing fence
      blocks.push(
        <pre key={key++} className="md-pre">
          {lang && <span className="md-pre-lang">{lang}</span>}
          <code>{buf.join('\n')}</code>
        </pre>
      );
      continue;
    }
    // heading
    const h = line.match(/^(#{1,4})\s+(.+)$/);
    if (h) {
      const level = h[1].length;
      const Tag = `h${Math.min(level + 1, 6)}`;
      blocks.push(React.createElement(Tag, { key: key++, className: `md-h md-h${level}` }, renderInline(h[2])));
      i++; continue;
    }
    // blockquote (collect consecutive > lines)
    if (/^>\s?/.test(line)) {
      const buf = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) { buf.push(lines[i].replace(/^>\s?/, '')); i++; }
      blocks.push(<blockquote key={key++} className="md-bq">{renderInline(buf.join(' '))}</blockquote>);
      continue;
    }
    // horizontal rule
    if (/^---+\s*$/.test(line)) {
      blocks.push(<hr key={key++} className="md-hr"/>);
      i++; continue;
    }
    // unordered list
    if (/^[-*+]\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^[-*+]\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^[-*+]\s+/, ''));
        i++;
      }
      blocks.push(
        <ul key={key++} className="md-ul">
          {items.map((t, k) => <li key={k}><span className="md-bullet">—</span><span>{renderInline(t)}</span></li>)}
        </ul>
      );
      continue;
    }
    // ordered list
    if (/^\d+\.\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\d+\.\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\d+\.\s+/, ''));
        i++;
      }
      blocks.push(
        <ol key={key++} className="md-ol">
          {items.map((t, k) => (
            <li key={k}>
              <span className="md-num mono">{String(k + 1).padStart(2, '0')}</span>
              <span>{renderInline(t)}</span>
            </li>
          ))}
        </ol>
      );
      continue;
    }
    // blank line: skip
    if (/^\s*$/.test(line)) { i++; continue; }
    // paragraph: merge with following non-empty, non-special lines
    const buf = [line];
    i++;
    while (i < lines.length && !/^\s*$/.test(lines[i]) && !/^```/.test(lines[i]) && !/^#{1,4}\s/.test(lines[i]) && !/^>/.test(lines[i]) && !/^[-*+]\s/.test(lines[i]) && !/^\d+\.\s/.test(lines[i]) && !/^---+\s*$/.test(lines[i])) {
      buf.push(lines[i]);
      i++;
    }
    blocks.push(<p key={key++} className="md-p">{renderInline(buf.join(' '))}</p>);
  }
  return <div className="md">{blocks}</div>;
}

// Rough token estimate. 4 chars per token is the industry hand-wave.
function estimateTokens(s) {
  return Math.max(1, Math.round((s || '').length / 4));
}

function TimeDivider({ ts }) {
  const d = new Date(ts);
  const label = d.toLocaleTimeString('en', { hour: 'numeric', minute: '2-digit' });
  return (
    <div className="time-divider">
      <span className="time-divider-dot"/>
      <span className="time-divider-label">{label}</span>
      <span className="time-divider-dot"/>
    </div>
  );
}

// Composer sub-components: provider picker, model picker, char counter.

function ProviderPicker({ providers }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const onDoc = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [open]);
  const active = providers.active;
  const count = providers.state.profiles.length;
  return (
    <div className="picker" ref={ref}>
      <button className={`picker-btn${open ? ' is-open' : ''}`} onClick={() => setOpen(o => !o)} title={`${count} provider${count === 1 ? '' : 's'}`}>
        <span className="picker-dot" style={{ background: active.apiKey ? 'var(--signal)' : 'var(--ink-4)' }}/>
        <span className="picker-label">{active.name || 'provider'}</span>
        <span className="picker-caret">▾</span>
      </button>
      {open && (
        <div className="picker-pop">
          <div className="picker-pop-head">profiles</div>
          {providers.state.profiles.map(p => (
            <button
              key={p.id}
              className={`picker-pop-row${p.id === active.id ? ' is-active' : ''}`}
              onClick={() => { providers.setActive(p.id); setOpen(false); }}
            >
              <span className="picker-pop-name">{p.name}</span>
              <span className="picker-pop-model">{p.model || 'no model'}</span>
            </button>
          ))}
          <div className="picker-pop-foot">
            <span style={{color:'var(--ink-4)'}}>manage in Settings → Providers</span>
          </div>
        </div>
      )}
    </div>
  );
}

function ModelPicker({ providers }) {
  const [open, setOpen] = React.useState(false);
  const [loading, setLoading] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const onDoc = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [open]);
  const active = providers.active;
  const models = active.models || [];
  const needsRefresh = models.length === 0 || (Date.now() - (active.lastFetched || 0)) > 24 * 60 * 60 * 1000;
  const refresh = async () => {
    setLoading(true);
    await providers.refreshModels(active.id);
    setLoading(false);
  };
  React.useEffect(() => {
    if (open && needsRefresh && !loading && active.apiKey) refresh();
  }, [open]);
  return (
    <div className="picker picker-model" ref={ref}>
      <button className={`picker-btn picker-btn-mono${open ? ' is-open' : ''}`} onClick={() => setOpen(o => !o)}>
        <span className="picker-label">{active.model || 'pick model'}</span>
        <span className="picker-caret">▾</span>
      </button>
      {open && (
        <div className="picker-pop picker-pop-wide">
          <div className="picker-pop-head">
            models · {active.name}
            <button className="picker-refresh" onClick={refresh} disabled={loading} title="refetch /models">
              {loading ? '↻' : '↺'}
            </button>
          </div>
          <div className="picker-pop-scroll">
            {models.length === 0 && (
              <div className="picker-pop-empty">
                {active.apiKey ? 'no models cached. hit refresh.' : 'add an api key to list models.'}
              </div>
            )}
            {models.map(m => (
              <button
                key={m}
                className={`picker-pop-row${m === active.model ? ' is-active' : ''}`}
                onClick={() => { providers.setActiveModel(m); setOpen(false); }}
              >
                <span className="picker-pop-model mono">{m}</span>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function CharCount({ value }) {
  const len = value.length;
  if (len < 2000) return null;
  const pct = Math.min(1, len / 16000);
  const cls = pct >= 1 ? 'is-red' : pct >= 0.8 ? 'is-amber' : '';
  return <span className={`char-count ${cls}`}>{len.toLocaleString()}</span>;
}

function Msg({ m, onHoverChip, onClickChip }) {
  const isUser = m.role === 'user';
  const body = isUser ? (
    // user messages render plain, preserving their exact typing
    <div className="msg-text-plain">{m.text}</div>
  ) : (
    <div className="msg-text">
      <MarkdownRender text={m.text}/>
      {m._streaming && <span className="msg-caret" aria-hidden/>}
    </div>
  );
  return (
    <div className={`msg msg-${m.role}`}>
      <div className={`msg-tag ${isUser ? 'msg-tag-user' : 'msg-tag-assistant'}`}>

// MapHUD 

function MapHUD({ hoveredId, selectedId, onNodeHover, onNodeClick }) {
  const [collapsed, setCollapsed] = React.useState(false);
  const { graph, curatedIds } = useBackend();
  const highlight = curatedIds.length > 0 ? curatedIds : (hoveredId ? [hoveredId] : []);
  const n = selectedId ? graph.nodes.find(x => x.id === selectedId) : null;

  if (collapsed) {
    return (
      <button className="hud-pill" onClick={() => setCollapsed(false)} title="expand memory map">
        <span className="heartbeat"/>
        memory · {graph.nodes.length} nodes
      </button>
    );
  }

  function neighbors(id) {
    return (graph.edges || []).reduce((acc, e) => {
      if (e.a === id) { const nb = graph.nodes.find(x => x.id === e.b); if (nb) acc.push(nb); }
      if (e.b === id) { const nb = graph.nodes.find(x => x.id === e.a); if (nb) acc.push(nb); }
      return acc;
    }, []);
  }
  function inE(id)  { return (graph.edges || []).filter(e => e.b === id).length; }
  function outE(id) { return (graph.edges || []).filter(e => e.a === id).length; }

  return (
    <div className="hud">
      <div className="hud-head">
        <KeyButton/>
        <span className="heartbeat"/>
        <strong>memory</strong>
        <span className="sp"/>
        <span style={{color:'var(--ink-4)',fontSize:10}}>{graph.nodes.length}·{(graph.edges||[]).length}</span>
        <button onClick={() => setCollapsed(true)} title="collapse">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M2 2l6 6M8 2l-6 6" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>
          </svg>
        </button>
      </div>

      <div className="hud-stage">
        <Graph
          width={300} height={220}
          highlightIds={highlight}
          recentIds={curatedIds}
          selectedId={selectedId}
          onNodeHover={onNodeHover}
          onNodeClick={onNodeClick}
          variant="ambient"
          showLabels={false}
        />
      </div>

      {n ? (
        <div className="hud-insp">
          <div className="insp-type">{n.t}</div>
          <div className="insp-title">{n.label}</div>
          <div className="insp-meta">
            <span>{inE(n.id)} in</span>
            <span className="dotm"/>
            <span>{outE(n.id)} out</span>
          </div>
          <div className="insp-rel-items">
            {neighbors(n.id).slice(0, 4).map((x, i) => (
              <NodeChip key={i} id={x.id} onClick={onNodeClick}/>
            ))}
          </div>
        </div>
      ) : (
        <div className="hud-foot">
          <span className="h-meta">hover <kbd className="hud-kbd">?</kbd> for key</span>
          <span className="sp"/>
          <span className="h-meta">live</span>
        </div>
      )}
    </div>
  );
}

function ProviderEditor({ profile, providers, onClose }) {
  const [name, setName]     = React.useState(profile.name || '');
  const [base, setBase]     = React.useState(profile.baseUrl || '');
  const [key, setKey]       = React.useState(profile.apiKey || '');
  const [model, setModel]   = React.useState(profile.model || '');
  const [reveal, setReveal] = React.useState(false);
  const [loading, setLoading] = React.useState(false);
  const models = profile.models || [];

  const commit = (patch) => providers.upsert({ ...profile, ...patch });

  const pullModels = async () => {
    commit({ name, baseUrl: base, apiKey: key });
    setLoading(true);
    await providers.refreshModels(profile.id);
    setLoading(false);
  };

  return (
    <div className="prov-editor">
      <SetRow label="Label" hint="your name for it">
        <input className="set-input" value={name}
          onChange={e => { setName(e.target.value); commit({ name: e.target.value }); }}
          placeholder="Anthropic, OpenAI, Local Ollama…"/>
      </SetRow>
      <SetRow label="Base URL" hint="OpenAI-compatible">
        <input className="set-input" value={base}
          onChange={e => { setBase(e.target.value); commit({ baseUrl: e.target.value }); }}
          placeholder="https://api.openai.com/v1"/>
      </SetRow>
      <SetRow label="API key" hint="stored locally">
        <div className="set-secret">
          <input className="set-input" type={reveal ? 'text' : 'password'} value={key}
            onChange={e => { setKey(e.target.value); commit({ apiKey: e.target.value }); }}
            placeholder="sk-…"/>
          <button onClick={() => setReveal(!reveal)}>{reveal ? 'hide' : 'show'}</button>
        </div>
      </SetRow>
      <SetRow label="Model" hint={models.length > 0 ? `${models.length} cached` : 'pull to list'}>
        <div className="prov-model-row">
          {models.length > 0 ? (
            <select className="set-input" value={model}
              onChange={e => { setModel(e.target.value); commit({ model: e.target.value }); }}>
              <option value="">— pick a model —</option>
              {models.map(m => <option key={m} value={m}>{m}</option>)}
            </select>
          ) : (
            <input className="set-input" value={model}
              onChange={e => { setModel(e.target.value); commit({ model: e.target.value }); }}
              placeholder="claude-haiku-4-5 / gpt-4.1-mini / llama3.1"/>
          )}
          <button className="btn-ghost" onClick={pullModels} disabled={loading || !base}>
            {loading ? 'pulling…' : 'pull models'}
          </button>
        </div>
      </SetRow>
    </div>
  );
}

function SetRow({ label, hint, children, wide }) {
  return (
    <div className={`set-row${wide ? ' is-wide' : ''}`}>
      <div>
        <div className="set-row-label">{label}</div>
        {hint && <div className="set-row-hint">{hint}</div>}
      </div>
      <div>{children}</div>
    </div>
  );
}

// Tweaks panel 

const TWEAK_DEFAULTS = { theme: 'paper', density: 'balanced', accent: '#E6188A' };

function useTweaks() {
  const [t, setT] = React.useState(() => {
    try {
      const raw = localStorage.getItem('rook:tweaks');
      if (raw) return { ...TWEAK_DEFAULTS, ...JSON.parse(raw) };
    } catch (_) {}
    return TWEAK_DEFAULTS;
  });
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', t.theme);
    document.documentElement.style.setProperty('--signal', t.accent);
    try { localStorage.setItem('rook:tweaks', JSON.stringify(t)); } catch (_) {}
  }, [t]);
  return [t, setT];
}

function TweaksPanel({ open, onClose, tweaks, setTweaks }) {
  if (!open) return null;
  const set = (k, v) => setTweaks(prev => ({ ...prev, [k]: v }));
  const swatches = ['#E6188A','#FF5A1F','#7C2AA3','#0FB5A6','#F5B000'];
  return (
    <div className="tweaks-panel">
      <div className="tweaks-head">
        <span className="tweaks-title">Customizies</span>
        <button className="tweaks-close" onClick={onClose}>×</button>
      </div>
      <div className="tw-row">
        <div><div className="tw-label">Palette</div><div className="tw-hint">paper or ink</div></div>
        <div className="set-seg">
          <button className={tweaks.theme === 'paper' ? 'is-active' : ''} onClick={() => set('theme','paper')}>paper</button>
          <button className={tweaks.theme === 'ink'   ? 'is-active' : ''} onClick={() => set('theme','ink')}>ink</button>
        </div>
      </div>
      <div className="tw-row">
        <div><div className="tw-label">Accent</div></div>
        <div className="tw-sw">
          {swatches.map(c => (
            <button key={c} className={tweaks.accent === c ? 'is-active' : ''} style={{background:c}} onClick={() => set('accent',c)}/>
          ))}
        </div>
      </div>
    </div>
  );
}

// Cmd+K palette 
//
// Fuzzy-ish substring search across conversations, memory nodes, pages,
// and quick actions. Pure frontend. Cmd+K / Ctrl+K opens, Esc closes,
// arrows navigate, Enter selects.

function Palette({ open, onClose, onPickPage, onPickConv, onPickNode, onNewChat, onToggleTheme }) {
  const { sessions, graph } = useBackend();
  const [q, setQ] = React.useState('');
  const [cursor, setCursor] = React.useState(0);
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    if (open) {
      setQ('');
      setCursor(0);
      setTimeout(() => inputRef.current?.focus(), 0);
    }
  }, [open]);

  const actions = React.useMemo(() => [
    { kind: 'action', label: 'New chat',           hint: 'start fresh',     icon: '＋', run: onNewChat },
    { kind: 'action', label: 'Open Chat',          hint: 'page',            icon: '◌', run: () => onPickPage('chat') },
    { kind: 'action', label: 'Open Skills',        hint: 'page',            icon: '◌', run: () => onPickPage('skills') },
    { kind: 'action', label: 'Open Settings',      hint: 'page',            icon: '◌', run: () => onPickPage('settings') },
    { kind: 'action', label: 'Toggle paper / ink', hint: 'theme',           icon: '◐', run: onToggleTheme },
  ], [onPickPage, onNewChat, onToggleTheme]);

  const results = React.useMemo(() => {
    const ql = q.toLowerCase().trim();
    const out = [];
    if (!ql) {
      // Empty query: show actions + recent sessions
      for (const a of actions) out.push(a);
      for (const s of sessions.slice(0, 6)) {
        out.push({ kind: 'session', label: s.title, hint: s.when, icon: '✎', payload: s });
      }
      return out;
    }
    const score = (s) => {
      const t = (s || '').toLowerCase();
      if (!t) return -1;
      if (t === ql) return 1000;
      if (t.startsWith(ql)) return 500;
      const i = t.indexOf(ql);
      return i >= 0 ? 100 - i : -1;
    };
    const candidates = [];
    for (const a of actions) {
      const sc = Math.max(score(a.label), score(a.hint));
      if (sc >= 0) candidates.push({ ...a, _s: sc });
    }
    for (const s of sessions) {
      const sc = score(s.title);
      if (sc >= 0) candidates.push({
        kind: 'session', label: s.title, hint: s.when, icon: '✎',
        payload: s, _s: sc - 5,
      });
    }
    for (const n of graph.nodes) {
      const sc = score(n.label);
      if (sc >= 0) candidates.push({
        kind: 'node', label: n.label, hint: n.t, icon: glyphFor(n.t),
        payload: n, _s: sc - 10,
      });
    }
    candidates.sort((a, b) => b._s - a._s);
    for (const c of candidates.slice(0, 30)) out.push(c);
    return out;
  }, [q, sessions, graph, actions]);

  React.useEffect(() => { setCursor(0); }, [q]);

  if (!open) return null;

  const pick = (r) => {
    if (!r) return;
    if (r.kind === 'action') r.run();
    else if (r.kind === 'session') onPickConv(r.payload);
    else if (r.kind === 'node') onPickNode(r.payload.id);
    onClose();
  };

  const onKey = (e) => {
    if (e.key === 'Escape') { e.preventDefault(); onClose(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); setCursor(c => Math.min(results.length - 1, c + 1)); }
    else if (e.key === 'ArrowUp')   { e.preventDefault(); setCursor(c => Math.max(0, c - 1)); }
    else if (e.key === 'Enter')     { e.preventDefault(); pick(results[cursor]); }
  };

  return (
    <div className="palette-shroud" onMouseDown={onClose}>
      <div className="palette" onMouseDown={e => e.stopPropagation()}>
        <div className="palette-input-wrap">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="7" cy="7" r="4.5" stroke="currentColor" strokeWidth="1.4"/>
            <path d="M10.3 10.3L14 14" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
          </svg>
          <input
            ref={inputRef}
            value={q}
            onChange={e => setQ(e.target.value)}
            onKeyDown={onKey}
            placeholder="search conversations, memory, actions…"
          />
          <span className="palette-kbd mono">esc</span>
        </div>
        <div className="palette-list">
          {results.length === 0 ? (
            <div className="palette-empty">no matches</div>
          ) : results.map((r, i) => (
            <div
              key={i}
              className={`palette-row ${i === cursor ? 'is-active' : ''} kind-${r.kind}`}
              onMouseEnter={() => setCursor(i)}
              onMouseDown={(e) => { e.preventDefault(); pick(r); }}
            >
              <span className="palette-row-icon">{r.icon}</span>
              <span className="palette-row-label">{r.label}</span>
              {r.hint && <span className="palette-row-hint">{r.hint}</span>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function glyphFor(t) {
  return ({ person:'●', place:'◆', thing:'■', fact:'＋', project:'⬡', skill:'▲' })[t] || '·';
}

// App shell 

function App() {
  const [page, setPage] = React.useState(() => localStorage.getItem('rook:page') || 'chat');
  const [tweaks, setTweaks]     = useTweaks();
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [paletteOpen, setPaletteOpen] = React.useState(false);
  const [hoveredNode, setHoveredNode] = React.useState(null);
  const [selectedNode, setSelectedNode] = React.useState(null);
  const { pipeOk, version, graph, sessions, newConversation, loadConversation } = useBackend();

  React.useEffect(() => { localStorage.setItem('rook:page', page); }, [page]);

  // Cmd/Ctrl + K opens the palette. Esc inside the palette closes it.
  React.useEffect(() => {
    const onKey = (e) => {
      const meta = e.metaKey || e.ctrlKey;
      if (meta && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        setPaletteOpen(o => !o);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const toggleTheme = () => {
    setTweaks(t => ({ ...t, theme: t.theme === 'paper' ? 'ink' : 'paper' }));
  };

  const nav = [
    { k: 'chat',     label: 'Chat'     },
    { k: 'skills',   label: 'Skills'   },
    { k: 'settings', label: 'Settings' },
  ];

  return (
    <div className="app">
      <div className="main-pane">
        <header className="topbar">
          <div className="topbar-left">
            <div className="brand">
              <span className="brand-word">Rook</span>
              {version && <span className="brand-ver">v{version}</span>}
            </div>
            <div className="topbar-context">
              <span><strong>{graph.nodes.length}</strong> nodes</span>
              {sessions.length > 0 && <><span className="topbar-dot"/><span>{sessions.length} sessions</span></>}
            </div>
          </div>

          <nav className="topbar-nav">
            {nav.map(it => (
              <button key={it.k} className={page === it.k ? 'is-active' : ''} onClick={() => setPage(it.k)}>
                {it.label}
              </button>
            ))}
          </nav>

          <div className="topbar-right">
            {pipeOk
              ? <span className="pill is-signal"><span className="pill-dot"/>live</span>
              : <span className="pill" style={{color:'var(--ink-4)'}}>disconnected</span>}
            <button className="iconpill" title="search · ⌘K" onClick={() => setPaletteOpen(true)}>
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <circle cx="7" cy="7" r="4.5" stroke="currentColor" strokeWidth="1.4"/>
                <path d="M10.3 10.3L14 14" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
              </svg>
            </button>
            <button className="iconpill" title="customizies" onClick={() => setTweaksOpen(o => !o)}>
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="1.5" fill="currentColor"/>
                <circle cx="3" cy="8" r="1.5" fill="currentColor"/>
                <circle cx="13" cy="8" r="1.5" fill="currentColor"/>
              </svg>
            </button>
            <div className="win-controls">
              <button className="win-btn" onClick={() => window.rook?.minimize()} title="minimize">−</button>
              <button className="win-btn" onClick={() => window.rook?.maximize()} title="maximize">□</button>
              <button className="win-btn close" onClick={() => window.rook?.close()} title="close">×</button>
            </div>
          </div>
        </header>

        <div className="content">
          {page === 'chat' && (
            <div className="chat-layout has-rail">
              <Chat
                onHoverNode={setHoveredNode}
                selectedNode={selectedNode}
                onSelectNode={setSelectedNode}
              />
              <MapHUD
                hoveredId={hoveredNode}
                selectedId={selectedNode || hoveredNode}
                onNodeHover={setHoveredNode}
                onNodeClick={setSelectedNode}
              />
              <Rail onSelectNode={setSelectedNode}/>
            </div>
          )}
          {page === 'skills'   && <Skills/>}
          {page === 'settings' && <Settings/>}
        </div>
      </div>

      <TweaksPanel
        open={tweaksOpen}
        onClose={() => setTweaksOpen(false)}
        tweaks={tweaks}
        setTweaks={setTweaks}
      />

      <Palette
        open={paletteOpen}
        onClose={() => setPaletteOpen(false)}
        onPickPage={(p) => setPage(p)}
        onPickConv={(s) => { loadConversation(s.id, s.title); setPage('chat'); }}
        onPickNode={(id) => { setSelectedNode(id); setPage('chat'); }}
        onNewChat={() => { newConversation(); setPage('chat'); }}
        onToggleTheme={toggleTheme}
      />
    </div>
  );
}

// Mount 

ReactDOM.createRoot(document.getElementById('root')).render(
  <BackendProvider>
    <App/>
  </BackendProvider>
);
</script>
</body>
</html>
